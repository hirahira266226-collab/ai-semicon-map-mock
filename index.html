<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AI・半導体 構造マップ (モック)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
  :root{
    --bg:#07080d;
    --bg2:#0d0f18;
    --panel:#111420ee;
    --border:#242938;
    --text:#e7e9f0;
    --sub:#9aa0b4;
    --accent:#22d3ee;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;width:100%;height:100%;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    overflow:hidden;overscroll-behavior:none;}
  #app{position:relative;width:100vw;height:100vh;}
  svg{width:100%;height:100%;display:block;background:radial-gradient(ellipse at 50% 40%, #12141f 0%, #07080d 70%);cursor:grab;}
  svg.dragging{cursor:grabbing;}

  /* ---- top bar ---- */
  #topbar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:10px;
    padding:10px 12px;pointer-events:none;}
  #topbar > *{pointer-events:auto;}
  #title{font-size:14px;font-weight:600;letter-spacing:.02em;color:var(--text);white-space:nowrap;
    background:var(--panel);border:1px solid var(--border);padding:7px 12px;border-radius:10px;backdrop-filter:blur(6px);}
  #title small{display:block;font-weight:400;color:var(--sub);font-size:10px;margin-top:1px;}
  #searchWrap{flex:1;max-width:280px;position:relative;}
  #search{width:100%;background:var(--panel);border:1px solid var(--border);color:var(--text);
    padding:9px 12px 9px 32px;border-radius:10px;font-size:13px;outline:none;backdrop-filter:blur(6px);}
  #search::placeholder{color:var(--sub);}
  #search:focus{border-color:var(--accent);}
  #searchIcon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--sub);font-size:13px;pointer-events:none;}
  #legendToggle{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:10px;
    padding:9px 12px;font-size:12px;cursor:pointer;backdrop-filter:blur(6px);white-space:nowrap;}
  #legendToggle:hover{border-color:var(--accent);}
  #scOpenBtn{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:10px;
    padding:9px 12px;font-size:12px;cursor:pointer;backdrop-filter:blur(6px);white-space:nowrap;}
  #scOpenBtn:hover{border-color:var(--accent);}

  /* ---- legend ---- */
  #legend{position:absolute;left:12px;bottom:12px;z-index:20;background:var(--panel);border:1px solid var(--border);
    border-radius:12px;padding:10px;backdrop-filter:blur(6px);max-width:210px;transition:transform .2s ease,opacity .2s ease;}
  #legend.hidden{transform:translateY(12px);opacity:0;pointer-events:none;}
  #legend .lg-title{font-size:10px;color:var(--sub);margin-bottom:6px;letter-spacing:.05em;}
  .lg-item{display:flex;align-items:center;gap:7px;padding:4px 6px;border-radius:7px;cursor:pointer;font-size:11.5px;
    color:var(--text);user-select:none;transition:background .15s;}
  .lg-item:hover{background:#ffffff0d;}
  .lg-item.off{opacity:.35;}
  .lg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;box-shadow:0 0 6px currentColor;}
  .lg-reset{margin-top:6px;font-size:10.5px;color:var(--accent);cursor:pointer;text-align:right;}

  /* ---- zoom controls ---- */
  #zoomctl{position:absolute;right:12px;bottom:12px;z-index:20;display:flex;flex-direction:column;gap:6px;}
  .zbtn{width:36px;height:36px;background:var(--panel);border:1px solid var(--border);color:var(--text);
    border-radius:10px;font-size:16px;cursor:pointer;backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;}
  .zbtn:hover{border-color:var(--accent);color:var(--accent);}
  .zbtn:active{transform:scale(.95);}

  /* ---- hint ---- */
  #hint{position:absolute;left:50%;top:10px;transform:translateX(-50%);z-index:15;font-size:11px;color:var(--sub);
    background:var(--panel);border:1px solid var(--border);padding:5px 10px;border-radius:8px;pointer-events:none;
    opacity:.9;transition:opacity .5s;}

  /* ---- detail panel (desktop = side, mobile = bottom sheet) ---- */
  #detail{position:absolute;top:0;right:0;height:100%;width:340px;max-width:88vw;background:var(--panel);
    border-left:1px solid var(--border);backdrop-filter:blur(10px);z-index:30;transform:translateX(100%);
    transition:transform .28s cubic-bezier(.2,.8,.3,1);overflow-y:auto;padding:18px 18px 40px;}
  #detail.open{transform:translateX(0);}
  #detail .close{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;
    background:#ffffff10;border:none;color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  #detail .cat-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:999px;
    background:#ffffff0f;border:1px solid var(--border);margin-bottom:10px;}
  #detail .cat-dot{width:8px;height:8px;border-radius:50%;}
  #detail h2{margin:2px 0 2px;font-size:19px;font-weight:700;line-height:1.3;padding-right:30px;}
  #detail .ticker{font-size:12.5px;color:var(--sub);margin-bottom:14px;}
  #detail .strength-row{margin-bottom:16px;}
  #detail .strength-label{font-size:11px;color:var(--sub);margin-bottom:5px;display:flex;justify-content:space-between;}
  #detail .strength-bar{height:7px;border-radius:99px;background:#ffffff12;overflow:hidden;}
  #detail .strength-fill{height:100%;border-radius:99px;}
  #detail .desc{font-size:13.2px;line-height:1.75;color:#d5d8e2;margin-bottom:18px;}
  #detail .rel-title{font-size:11px;color:var(--sub);margin:16px 0 8px;letter-spacing:.05em;}
  .rel-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;background:#ffffff08;
    margin-bottom:6px;cursor:pointer;font-size:12.5px;transition:background .15s;border:1px solid transparent;}
  .rel-item:hover{background:#ffffff14;border-color:var(--border);}
  .rel-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .rel-name{flex:1;color:var(--text);}
  .rel-type{font-size:10px;color:var(--sub);border:1px solid var(--border);padding:1px 6px;border-radius:99px;}

  @media (max-width:720px){
    #detail{left:0;right:0;top:auto;bottom:0;width:100%;max-width:100%;height:62vh;border-left:none;
      border-top:1px solid var(--border);border-radius:18px 18px 0 0;transform:translateY(100%);padding:16px 16px 30px;}
    #detail.open{transform:translateY(0);}
    #title small{display:none;}
    #searchWrap{max-width:110px;}
    #legend{max-width:150px;font-size:11px;}
    #scOpenBtn{font-size:11px;padding:9px 8px;}
    #scPanel{width:100%;max-width:100%;height:100%;border-radius:0;}
  }

  /* ---- supply chain overlay ---- */
  #scOverlay{position:fixed;inset:0;z-index:50;background:#05060ac0;backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;}
  #scOverlay.open{display:flex;}
  #scPanel{width:min(920px, 94vw);height:min(86vh, 980px);background:#0d0f18;border:1px solid var(--border);
    border-radius:16px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px #000a;}
  #scHeader{display:flex;align-items:flex-start;justify-content:space-between;padding:18px 20px 12px;
    border-bottom:1px solid var(--border);flex-shrink:0;}
  #scTitle{font-size:17px;font-weight:700;color:var(--text);}
  #scSubtitle{font-size:11.5px;color:var(--sub);margin-top:3px;}
  #scHeader .close{position:static;flex-shrink:0;}
  #scLegendNote{font-size:11.5px;color:var(--sub);line-height:1.6;padding:10px 20px;border-bottom:1px solid var(--border);
    flex-shrink:0;}
  .sc-bn-badge{display:inline-block;background:#ef444425;color:#ff8080;border:1px solid #ef444460;
    font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:99px;margin-right:6px;}
  #scBody{overflow-y:auto;padding:18px 20px 34px;flex:1;}

  .sc-stage{position:relative;padding-left:34px;padding-bottom:26px;}
  .sc-stage:last-child{padding-bottom:4px;}
  .sc-stage::before{content:'';position:absolute;left:9px;top:26px;bottom:-4px;width:2px;background:var(--border);}
  .sc-stage:last-child::before{display:none;}
  .sc-num{position:absolute;left:0;top:0;width:20px;height:20px;border-radius:50%;background:#ffffff14;
    border:1px solid var(--border);color:var(--sub);font-size:10.5px;font-weight:700;display:flex;
    align-items:center;justify-content:center;}
  .sc-stage.bn .sc-num{background:#ef444425;border-color:#ef444470;color:#ff9a9a;}
  .sc-stage-title{font-size:14.5px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px;
    flex-wrap:wrap;}
  .sc-stage-desc{font-size:12.3px;color:#c3c7d6;line-height:1.7;margin:6px 0 8px;}
  .sc-bn-note{font-size:11.8px;color:#ffb4b4;background:#ef444414;border:1px solid #ef444440;border-radius:9px;
    padding:8px 10px;margin-bottom:10px;line-height:1.6;}
  .sc-chips{display:flex;flex-wrap:wrap;gap:7px;}
  .sc-chip{background:#ffffff0d;border:1px solid var(--border);border-radius:99px;padding:5px 11px 5px 5px;
    font-size:12px;color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:6px;
    transition:background .15s,border-color .15s;}
  .sc-chip:hover{background:#ffffff1c;border-color:var(--accent);}
  .sc-chip .sc-chip-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:4px;}
  .sc-chip .sc-chip-ticker{color:var(--sub);font-size:10.5px;}
  .sc-chip.extra{border-style:dashed;}
  .sc-extra-desc{width:100%;font-size:11.5px;color:var(--sub);background:#ffffff08;border-radius:8px;
    padding:8px 10px;margin-top:2px;line-height:1.6;}
  .sc-final{font-size:12.3px;color:#c3c7d6;line-height:1.7;background:#ffffff08;border-radius:9px;padding:10px 12px;}

  .node-label{fill:#c7cbe0;font-size:10px;pointer-events:none;font-family:inherit;paint-order:stroke;
    stroke:#07080dcc;stroke-width:3px;stroke-linejoin:round;}
  .node-label.big{font-size:12px;fill:#f2f3f8;font-weight:600;}
</style>
</head>
<body>
<div id="app">
  <svg id="canvas"></svg>

  <div id="topbar">
    <div id="title">AI・半導体 構造マップ<small>モック / サンプルデータ・強さ指標は仮</small></div>

      <span id="searchIcon">&#128269;</span>
      <input id="search" type="text" placeholder="銘柄名・ティッカーで検索…" autocomplete="off">
    </div>
    <button id="legendToggle">凡例</button>
    <button id="scOpenBtn">🏭 サプライチェーン図</button>
  </div>

  <div id="hint">ドラッグで移動 / ホイール・ピンチで拡大縮小 / 玉をタップで詳細</div>

  <div id="legend"></div>

  <div id="zoomctl">
    <button class="zbtn" id="zin" title="拡大">+</button>
    <button class="zbtn" id="zout" title="縮小">−</button>
    <button class="zbtn" id="zreset" style="font-size:12px;" title="表示位置をリセット">⟳</button>
    <button class="zbtn" id="posReset" style="font-size:14px;" title="ドラッグした玉の配置をすべてリセット">📌</button>
  </div>

  <div id="detail">
    <button class="close" id="detailClose">✕</button>
    <div id="detailBody"></div>
  </div>

  <div id="scOverlay">
    <div id="scPanel">
      <div id="scHeader">
        <div>
          <div id="scTitle">AI・半導体 サプライチェーン図</div>
          <div id="scSubtitle">製造工程 → 消費者への提供までの流れ(仮データ・概略)</div>
        </div>
        <button class="close" id="scClose">✕</button>
      </div>
      <div id="scLegendNote">
        <span class="sc-bn-badge">ボトルネック</span>
        投資候補として特に重要な工程。その工程に部材・装置を納入する上流企業(前段の工程)も合わせて有力候補です。
      </div>
      <div id="scBody"></div>
    </div>
  </div>
</div>

/* =========================================================================
   4. サイズ・レイアウト設定
   ========================================================================= */
const rScale = d3.scaleSqrt().domain([1,10]).range([7,30]);
const catList = Object.keys(CATS);
const catAngle = d3.scaleLinear().domain([0,catList.length]).range([0,2*Math.PI]);

let W = window.innerWidth, H = window.innerHeight;
const clusterR = () => Math.min(W,H)*0.32;
const clusterCenter = {};
catList.forEach((c,i)=>{
  clusterCenter[c] = {
    x: () => W/2 + Math.cos(catAngle(i)) * clusterR(),
    y: () => H/2 + Math.sin(catAngle(i)) * clusterR(),
  };
});

/* =========================================================================
   5. SVG構築
   ========================================================================= */
const svg = d3.select('#canvas');
const defs = svg.append('defs');

// グロー用フィルタ
const glow = defs.append('filter').attr('id','glow').attr('x','-150%').attr('y','-150%').attr('width','400%').attr('height','400%');
glow.append('feGaussianBlur').attr('stdDeviation',4).attr('result','blur');
const merge = glow.append('feMerge');
merge.append('feMergeNode').attr('in','blur');
merge.append('feMergeNode').attr('in','SourceGraphic');

const root = svg.append('g').attr('id','root');
const linkLayer = root.append('g').attr('class','links');
const glowLayer = root.append('g').attr('class','glows');
const nodeLayer = root.append('g').attr('class','nodes');
const labelLayer = root.append('g').attr('class','labels');

/* zoom */
const zoom = d3.zoom()
  .scaleExtent([0.15, 6])
  .on('start', ()=> svg.classed('dragging', true))
  .on('zoom', (ev)=>{
    root.attr('transform', ev.transform);
    updateLabelVisibility(ev.transform.k);
  })
  .on('end', ()=> svg.classed('dragging', false));
svg.call(zoom).on('dblclick.zoom', null);

d3.select('#zin').on('click', ()=> svg.transition().duration(250).call(zoom.scaleBy, 1.4));
d3.select('#zout').on('click', ()=> svg.transition().duration(250).call(zoom.scaleBy, 1/1.4));

  svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);
});
d3.select('#posReset').on('click', ()=>{
  if(!confirm('ドラッグして固定した玉の配置をすべてリセットします。よろしいですか?')) return;
  clearSavedPositions();
  nodes.forEach(n=>{ n.fx=null; n.fy=null; });
  simulation.alpha(1).restart();
});

/* =========================================================================
   5b. ドラッグ位置の永続化 (localStorage)
   ノードを手動でドラッグした位置は保存され、ブラウザ更新やシステム改修後も維持される。
   ========================================================================= */
const LS_POS_KEY = 'aiSemiMap.positions.v1';
function loadSavedPositions(){
  try { return JSON.parse(localStorage.getItem(LS_POS_KEY) || '{}'); } catch(e){ return {}; }
}
function savePosition(id, x, y){
  try {
    const pos = loadSavedPositions();
    pos[id] = {x, y};
    localStorage.setItem(LS_POS_KEY, JSON.stringify(pos));
  } catch(e){ /* localStorage未対応環境などは無視 */ }
}
function clearSavedPositions(){
  try { localStorage.removeItem(LS_POS_KEY); } catch(e){}
}

const savedPositions = loadSavedPositions();
nodes.forEach(n=>{
  const p = savedPositions[n.id];
  if(p){ n.x = p.x; n.y = p.y; n.fx = p.x; n.fy = p.y; }
});

/* =========================================================================
   6. Force Simulation
   ========================================================================= */
const simulation = d3.forceSimulation(nodes)
  .force('link', d3.forceLink(links).id(d=>d.id).distance(l=>{
    return l.source.cat === l.target.cat ? 55 : 150;
  }).strength(l=> l.type==='compete' ? 0.15 : 0.35))
  .force('charge', d3.forceManyBody().strength(d=> -90 - rScale(d.strength)*4))
  .force('collide', d3.forceCollide().radius(d=> rScale(d.strength)+14).iterations(2))
  .force('clusterX', d3.forceX(d=>clusterCenter[d.cat].x()).strength(0.10))
  .force('clusterY', d3.forceY(d=>clusterCenter[d.cat].y()).strength(0.10))
  .force('center', d3.forceCenter(W/2,H/2).strength(0.02))
  .on('tick', ticked);

/* links */
const linkSel = linkLayer.selectAll('line')
  .data(links)
  .join('line')
  .attr('stroke', l=> l.type==='compete' ? '#ef444470' : (l.type==='customer' ? '#22d3ee55' : '#8b93aa45'))
  .attr('stroke-width', l=> l.type==='customer' ? 1.6 : 1)
  .attr('stroke-dasharray', l=> l.type==='compete' ? '2,3' : null);

/* glow circles (behind nodes, blurred, category color) */
const glowSel = glowLayer.selectAll('circle')
  .data(nodes)
  .join('circle')
  .attr('r', d=>rScale(d.strength)*1.15)
  .attr('fill', d=>CATS[d.cat].color)
  .attr('opacity', 0.35)
  .attr('filter','url(#glow)');

/* nodes */
const nodeSel = nodeLayer.selectAll('circle')
  .data(nodes)
  .join('circle')
  .attr('r', d=>rScale(d.strength))
  .attr('fill', d=>CATS[d.cat].color)
  .attr('stroke', '#0a0b12')
  .attr('stroke-width', 1.5)
  .style('cursor','pointer')
  .call(drag(simulation))
  .on('click', (ev,d)=>{ ev.stopPropagation(); selectNode(d); })
  .on('mouseenter', function(){ d3.select(this).attr('stroke','#fff').attr('stroke-width',2); })
  .on('mouseleave', function(d){
    if(!selected || selected.id!==d3.select(this).datum().id){
      d3.select(this).attr('stroke','#0a0b12').attr('stroke-width',1.5);
    }
  });

/* labels */
const labelSel = labelLayer.selectAll('text')
  .data(nodes)
  .join('text')
  .attr('class', d=> 'node-label' + (d.strength>=8 ? ' big' : ''))
  .attr('text-anchor','middle')
  .attr('dy', d=> -(rScale(d.strength)+6))
  .text(d=>flagName(d));

function updateLabelVisibility(k){
  labelSel.style('display', d=>{
    if (k > 0.55) return null;
    if (d.strength >= 8) return null;
    return 'none';
  });
}
updateLabelVisibility(1);

function ticked(){
  linkSel
    .attr('x1', d=>d.source.x).attr('y1', d=>d.source.y)
    .attr('x2', d=>d.target.x).attr('y2', d=>d.target.y);
  glowSel.attr('cx', d=>d.x).attr('cy', d=>d.y);
  nodeSel.attr('cx', d=>d.x).attr('cy', d=>d.y);
  labelSel.attr('x', d=>d.x).attr('y', d=>d.y);
}

function drag(sim){
  return d3.drag()
    .on('start', (ev,d)=>{
      if(!ev.active) sim.alphaTarget(0.25).restart();
      d.fx = d.x; d.fy = d.y;
    })
    .on('drag', (ev,d)=>{
      d.fx = ev.x; d.fy = ev.y;
    })
    .on('end', (ev,d)=>{
      if(!ev.active) sim.alphaTarget(0);
      // ドラッグして離した位置にそのままピン留めし、次回以降も同じ位置に復元されるよう保存する
      d.fx = ev.x; d.fy = ev.y;
      savePosition(d.id, d.fx, d.fy);
    });
}

/* =========================================================================
   7. 詳細パネル
   ========================================================================= */
let selected = null;
function selectNode(d){
  selected = d;
  nodeSel.attr('stroke', n=> n.id===d.id ? '#fff' : '#0a0b12')
         .attr('stroke-width', n=> n.id===d.id ? 2.5 : 1.5);

  const related = links.filter(l=> l.source.id===d.id || l.target.id===d.id)
    .map(l=>{
      const other = l.source.id===d.id ? l.target : l.source;
      return {node:other, type:l.type};
    })
    .sort((a,b)=> b.node.strength - a.node.strength);

  const cat = CATS[d.cat];
  const pct = Math.round(d.strength*10);

  document.getElementById('detailBody').innerHTML = `
    <div class="cat-badge"><span class="cat-dot" style="background:${cat.color}"></span>${cat.label}</div>
    <h2>${flagName(d)}</h2>
    <div class="ticker">${d.ticker} ・ ${d.market}</div>
    <div class="strength-row">
      <div class="strength-label"><span>テーマ内重要度(仮)</span><span>${d.strength} / 10</span></div>
      <div class="strength-bar"><div class="strength-fill" style="width:${pct}%;background:${cat.color}"></div></div>
    </div>
    <div class="desc">${d.desc}</div>
    <div class="rel-title">関連銘柄 (${related.length})</div>
    ${related.map(r=>`
      <div class="rel-item" data-id="${r.node.id}">
        <span class="rel-dot" style="background:${CATS[r.node.cat].color}"></span>
        <span class="rel-name">${flagName(r.node)}</span>
        <span class="rel-type">${LINK_TYPE_LABEL[r.type]}</span>
      </div>
    `).join('')}
  `;
  document.querySelectorAll('.rel-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      const target = nodeById[el.dataset.id];
      selectNode(target);
      focusOn(target);
    });
  });
  document.getElementById('detail').classList.add('open');
}

function focusOn(d){
  const scaleTarget = 1.4;
  const t = d3.zoomIdentity.translate(W/2 - d.x*scaleTarget, H/2 - d.y*scaleTarget).scale(scaleTarget);
  svg.transition().duration(500).call(zoom.transform, t);
}

document.getElementById('detailClose').addEventListener('click', ()=>{
  document.getElementById('detail').classList.remove('open');
  if(selected){
    nodeSel.attr('stroke','#0a0b12').attr('stroke-width',1.5);
    selected = null;
  }
});
svg.on('click', ()=>{
  document.getElementById('detail').classList.remove('open');
  if(selected){
    nodeSel.attr('stroke','#0a0b12').attr('stroke-width',1.5);
    selected = null;
  }
});

const legendEl = document.getElementById('legend');
let activeFilter = null; // null = 全表示
function renderLegend(){
  legendEl.innerHTML = `<div class="lg-title">カテゴリ (クリックで絞り込み)</div>` +
    catList.map(c=>`
      <div class="lg-item ${activeFilter && activeFilter!==c ? 'off':''}" data-cat="${c}">
        <span class="lg-dot" style="background:${CATS[c].color};color:${CATS[c].color}"></span>
        <span>${CATS[c].label}</span>
      </div>
    `).join('') +
    (activeFilter ? `<div class="lg-reset" id="lgReset">絞り込み解除</div>` : '');

  legendEl.querySelectorAll('.lg-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      const c = el.dataset.cat;
      activeFilter = (activeFilter===c) ? null : c;
      applyFilter();
      renderLegend();
    });
  });
  const rs = document.getElementById('lgReset');
  if(rs) rs.addEventListener('click', (e)=>{ e.stopPropagation(); activeFilter=null; applyFilter(); renderLegend(); });
}
function applyFilter(){
  if(!activeFilter){
    nodeSel.transition().duration(200).attr('opacity',1);
    glowSel.transition().duration(200).attr('opacity',0.35);
    linkSel.transition().duration(200).attr('opacity',1);
    labelSel.transition().duration(200).attr('opacity',1);
    return;
  }
  nodeSel.transition().duration(200).attr('opacity', d=> d.cat===activeFilter?1:0.12);
  glowSel.transition().duration(200).attr('opacity', d=> d.cat===activeFilter?0.35:0.03);
  labelSel.transition().duration(200).attr('opacity', d=> d.cat===activeFilter?1:0.12);
  linkSel.transition().duration(200).attr('opacity', l=> (l.source.cat===activeFilter||l.target.cat===activeFilter)?0.9:0.04);
}
renderLegend();

document.getElementById('legendToggle').addEventListener('click', ()=>{
  legendEl.classList.toggle('hidden');
});

/* =========================================================================
   9. 検索
   ========================================================================= */
const searchInput = document.getElementById('search');
searchInput.addEventListener('keydown', (e)=>{
  if(e.key !== 'Enter') return;
  const q = searchInput.value.trim().toLowerCase();
  if(!q) return;
  const hit = nodes.find(n => n.name.toLowerCase().includes(q) || n.ticker.toLowerCase().includes(q) || n.id.includes(q));
  if(hit){
    selectNode(hit);
    focusOn(hit);
  }
});

/* =========================================================================
   10b. サプライチェーン図
   ========================================================================= */
function scCompanyMeta(id){
  if(nodeById[id]) return {id, inGraph:true, ...nodeById[id]};
  if(EXTRA_COMPANIES[id]) return {id, inGraph:false, cat:null, ...EXTRA_COMPANIES[id]};
  return null;
}

function renderSupplyChain(){
  const body = document.getElementById('scBody');
  body.innerHTML = SUPPLY_CHAIN_STAGES.map((stage, idx)=>{
    const chips = stage.companies.map(id=>{
      const c = scCompanyMeta(id);
      if(!c) return '';
      const dotColor = c.inGraph ? CATS[c.cat].color : '#8b93aa';
      const cls = c.inGraph ? 'sc-chip' : 'sc-chip extra';
      return `<span class="${cls}" data-id="${c.id}" data-ingraph="${c.inGraph}">
        <span class="sc-chip-dot" style="background:${dotColor}"></span>
        ${flagName(c)} <span class="sc-chip-ticker">${c.ticker}</span>
      </span>`;
    }).join('');
    return `
      <div class="sc-stage ${stage.bottleneck?'bn':''}">
        <div class="sc-num">${idx+1}</div>
        <div class="sc-stage-title">${stage.title} ${stage.bottleneck? '<span class="sc-bn-badge">ボトルネック</span>':''}</div>
        <div class="sc-stage-desc">${stage.desc}</div>
        ${stage.bnNote ? `<div class="sc-bn-note">💡 ${stage.bnNote}</div>` : ''}
        <div class="sc-chips">${chips}</div>
      </div>
    `;
  }).join('') + `
    <div class="sc-stage">
      <div class="sc-num">${SUPPLY_CHAIN_STAGES.length+1}</div>
      <div class="sc-final">${SUPPLY_CHAIN_FINAL}</div>
    </div>
  `;

  body.querySelectorAll('.sc-chip').forEach(el=>{
    el.addEventListener('click', ()=>{
      const id = el.dataset.id;
      const inGraph = el.dataset.ingraph === 'true';
      if(inGraph){
        closeSupplyChain();
        const target = nodeById[id];
        selectNode(target);
        focusOn(target);
      } else {
        const existing = el.parentElement.querySelector('.sc-extra-desc[data-for="'+id+'"]');
        if(existing){ existing.remove(); return; }
        el.parentElement.querySelectorAll('.sc-extra-desc').forEach(n=>n.remove());
        const c = EXTRA_COMPANIES[id];
        const desc = document.createElement('div');
        desc.className = 'sc-extra-desc';
        desc.setAttribute('data-for', id);
        desc.textContent = c.desc;
        el.insertAdjacentElement('afterend', desc);
      }
    });
  });
}

function openSupplyChain(){
  renderSupplyChain();
  document.getElementById('scOverlay').classList.add('open');
}
function closeSupplyChain(){
  document.getElementById('scOverlay').classList.remove('open');
}
document.getElementById('scOpenBtn').addEventListener('click', openSupplyChain);
document.getElementById('scClose').addEventListener('click', closeSupplyChain);
document.getElementById('scOverlay').addEventListener('click', (e)=>{
  if(e.target.id === 'scOverlay') closeSupplyChain();
});

/* =========================================================================
   10. リサイズ対応
   ========================================================================= */
window.addEventListener('resize', ()=>{
  W = window.innerWidth; H = window.innerHeight;
  simulation.force('center', d3.forceCenter(W/2,H/2).strength(0.02));
  simulation.alpha(0.3).restart();
});

/* ヒント文言を数秒後にフェード */
setTimeout(()=>{ document.getElementById('hint').style.opacity = '0'; }, 6000);
</script>
